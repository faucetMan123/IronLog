<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Iron Log</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#14161B">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%2314161B'/%3E%3Ctext x='90' y='118' font-size='90' text-anchor='middle'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#14161B; --surface:#1E212A; --surface2:#262A35; --border:#333846;
  --text:#ECE9E2; --text-dim:#9AA0AE; --brass:#C08552; --green:#7FA66D; --red:#C1584A;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; height:100%;}
body{display:flex; flex-direction:column; max-width:520px; margin:0 auto;
  padding-top:env(safe-area-inset-top); overscroll-behavior:none;}
.display{font-weight:800; text-transform:uppercase; letter-spacing:0.04em;}
.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
#header{padding:16px 16px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0;}
#header .title{font-size:21px;}
#content{flex:1; overflow-y:auto; padding:16px 16px 100px; -webkit-overflow-scrolling:touch;}
#nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px;
  display:flex; background:var(--surface); border-top:1px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
.navbtn{flex:1; background:none; border:none; color:var(--text-dim); padding:8px 2px;
  display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; cursor:pointer;}
.navbtn.active{color:var(--brass);}
.navbtn svg{width:20px; height:20px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px;}
.tplcard{text-align:left; cursor:pointer; display:flex; flex-direction:column; gap:8px; color:var(--text); width:100%;}
.tplcard .name{font-size:18px;}
.tplcard .meta{font-size:11.5px; color:var(--text-dim);}
.tplcard .go{color:var(--brass); font-size:12px; font-weight:600;}
button{font-family:inherit;}
.btn{border-radius:10px; padding:12px; font-size:14px; cursor:pointer; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); width:100%;}
.btn-primary{background:var(--brass); color:#14161B; border:none; font-weight:700;}
.btn-ghost{background:transparent; color:var(--text-dim);}
.btn-small{width:auto; padding:6px 12px; font-size:12.5px; border-radius:7px;}
.btn:active{transform:scale(0.97);}
input,select,textarea{background:var(--surface2); border:1px solid var(--border); color:var(--text);
  border-radius:7px; padding:9px 8px; font-size:15px; width:100%;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brass); outline-offset:1px;}
.setrow{display:grid; grid-template-columns:24px 1fr 1fr 30px; gap:8px; margin-bottom:6px; align-items:center;}
.sethead{font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em;}
.dimtext{color:var(--text-dim); font-size:12px;}
.empty{color:var(--text-dim); font-size:13.5px; border:1px dashed var(--border); border-radius:10px; padding:22px; text-align:center;}
.sectionlabel{font-size:13px; color:var(--text-dim); margin:20px 0 10px; font-weight:800; text-transform:uppercase; letter-spacing:0.06em;}
.plates{display:flex; gap:4px; align-items:flex-end; height:22px;}
.plate{width:10px; height:12px; border-radius:2px; background:var(--surface2); border:1px solid var(--border); transition:all 0.2s;}
.plate.done{height:20px; background:var(--brass); border-color:var(--brass);}
table{width:100%; border-collapse:collapse; font-size:12.5px;}
td{padding:6px 8px; border-top:1px solid var(--border);}
.whead{display:flex; justify-content:space-between; align-items:center; background:var(--surface2); padding:9px 12px;}
.wblock{border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:14px;}
.iconbtn{background:none; border:none; color:var(--text-dim); cursor:pointer; padding:6px; font-size:16px; line-height:1;}
#toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--surface2);
  border:1px solid var(--border); padding:9px 16px; border-radius:8px; font-size:13px; white-space:nowrap;
  box-shadow:0 4px 14px rgba(0,0,0,0.4); display:none; z-index:99;}
canvas.chart{width:100%; height:180px; display:block;}
.togglerow{display:flex; gap:8px; margin-bottom:12px;}
.toggle{flex:1; padding:9px 8px; border-radius:8px; font-size:12.5px; cursor:pointer;
  background:var(--surface); color:var(--text-dim); border:1px solid var(--border);}
.toggle.active{background:var(--brass); color:#14161B; border-color:var(--brass); font-weight:700;}
.flexrow{display:flex; gap:10px;}
</style>
</head>
<body>
<div id="header"><span style="font-size:20px">🏋️</span><span class="display title" id="headerTitle">Iron Log</span></div>
<div id="content"></div>
<div id="nav"></div>
<div id="toast"></div>

<script>
"use strict";
//////////////////// STATE & STORAGE ////////////////////
const LS_KEY = "ironlog-v1";
const DEFAULT_TEMPLATES = [
  {id:"t1",name:"Push Heavy",exercises:[
    {id:"e1",name:"Bench",sets:4,reps:"5–8"},
    {id:"e2",name:"Incline DB",sets:3,reps:"6–10"},
    {id:"e3",name:"DB Shoulder Press",sets:3,reps:"6–10"},
    {id:"e4",name:"Lateral Raise",sets:4,reps:"12–20"},
    {id:"e5",name:"Rope Pushdown",sets:3,reps:"10–12"}]},
  {id:"t2",name:"Pull Heavy",exercises:[
    {id:"e6",name:"Pull-ups",sets:4,reps:"5–8"},
    {id:"e7",name:"Lat Pulldown",sets:3,reps:"6–10"},
    {id:"e8",name:"Seated Row",sets:4,reps:"6–10"},
    {id:"e9",name:"Rear Delt Fly",sets:3,reps:"12–20"},
    {id:"e10",name:"EZ Curl",sets:3,reps:"8–12"}]},
  {id:"t3",name:"Legs Heavy",exercises:[
    {id:"e11",name:"Squat",sets:4,reps:"5–8"},
    {id:"e12",name:"RDL",sets:3,reps:"6–10"},
    {id:"e13",name:"Bulgarian Split Squat",sets:3,reps:"8–12"},
    {id:"e14",name:"Leg Curl",sets:3,reps:"10–15"},
    {id:"e15",name:"Calf Raise",sets:4,reps:"10–15"}]},
  {id:"t4",name:"Push Volume",exercises:[
    {id:"e16",name:"Bench",sets:3,reps:"8–12"},
    {id:"e17",name:"Incline DB",sets:3,reps:"10–12"},
    {id:"e18",name:"Lateral Raise",sets:4,reps:"15–20"},
    {id:"e19",name:"Cable Fly",sets:3,reps:"12–20"},
    {id:"e20",name:"Overhead Triceps Extension",sets:3,reps:"10–15"},
    {id:"e21",name:"Pushdown",sets:2,reps:"12–20"}]},
  {id:"t5",name:"Pull Volume",exercises:[
    {id:"e22",name:"Pulldown",sets:4,reps:"10–15"},
    {id:"e23",name:"Seated Cable Row",sets:3,reps:"10–15"},
    {id:"e24",name:"Face Pull",sets:3,reps:"15–25"},
    {id:"e25",name:"EZ/Bar Curl",sets:3,reps:"12–15"},
    {id:"e26",name:"Rope Hammer Curl",sets:3,reps:"12–15"}]},
  {id:"t6",name:"Legs Volume",exercises:[
    {id:"e27",name:"Squat",sets:3,reps:"8–12"},
    {id:"e28",name:"RDL",sets:3,reps:"10–12"},
    {id:"e29",name:"Leg Extension",sets:3,reps:"12–20"},
    {id:"e30",name:"Leg Curl",sets:3,reps:"12–20"},
    {id:"e31",name:"Calf Raise",sets:4,reps:"12–20"}]},
];

let data = load();
let tab = "home";
let session = null; // active workout
let chartExercise = null;
let exportFormat = "text";

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d = JSON.parse(raw); if(d && d.templates) return d; }
  }catch(e){}
  return {templates: JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)), workouts: []};
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(data)); }
  catch(e){ toast("Save failed — storage may be full"); }
}
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); }
function fmtDT(iso){ const d=new Date(iso); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"})+" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); }
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block";
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.display="none",2200);
}

//////////////////// NAV ////////////////////
const NAV = [
  {id:"home",label:"Home",icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5v11M17.5 6.5v11M3 9v6M21 9v6M6.5 12h11"/></svg>'},
  {id:"sheet",label:"Sheet",icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>'},
  {id:"charts",label:"Charts",icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 20h18M5 16l4-6 4 3 6-8"/></svg>'},
  {id:"export",label:"Export",icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>'},
  {id:"edit",label:"Edit",icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 3h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 21h4l.5-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6c.1-.4.1-.8.1-1.2z"/></svg>'},
];
function renderNav(){
  const nav = document.getElementById("nav");
  if(tab==="session"){ nav.style.display="none"; return; }
  nav.style.display="flex";
  nav.innerHTML = NAV.map(n=>
    `<button class="navbtn ${tab===n.id?'active':''}" onclick="go('${n.id}')">${n.icon}<span>${n.label}</span></button>`
  ).join("");
}
function go(t){
  if(session && t!=="session"){
    if(!confirm("Leave workout? Unsaved sets will be lost.")) return;
    session = null;
  }
  tab = t; render();
}

//////////////////// AUTOFILL ////////////////////
function lastSets(exName, templateId){
  const sorted = [...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  for(const w of sorted){
    if(templateId && w.templateId !== templateId) continue; // same template only: Heavy fills from Heavy, Volume from Volume
    const e = w.entries.find(x=>x.exerciseName.toLowerCase()===exName.toLowerCase());
    if(e && e.sets.length) return e.sets.map(s=>({weight:s.weight, reps:s.reps}));
  }
  return [];
}

//////////////////// RENDER ////////////////////
function render(){
  const titles = {home:"Your Templates", session: session?session.templateName:"Workout",
    sheet:"All Workouts", charts:"Progression", export:"Export / Import", edit:"Edit Templates"};
  document.getElementById("headerTitle").textContent = titles[tab] || "Iron Log";
  renderNav();
  const c = document.getElementById("content");
  if(tab==="home") c.innerHTML = viewHome();
  else if(tab==="session") c.innerHTML = viewSession();
  else if(tab==="sheet") c.innerHTML = viewSheet();
  else if(tab==="charts"){ c.innerHTML = viewCharts(); drawCharts(); }
  else if(tab==="export") c.innerHTML = viewExport();
  else if(tab==="edit") c.innerHTML = viewEdit();
  c.scrollTop = 0;
}

//////////////////// HOME ////////////////////
function viewHome(){
  const recent = [...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  let h = '<div class="grid2">';
  for(const t of data.templates){
    h += `<button class="card tplcard" onclick="startSession('${t.id}')">
      <span class="display name">${esc(t.name)}</span>
      <span class="meta">${t.exercises.length} exercises</span>
      <span class="go">Start ›</span></button>`;
  }
  h += '</div><div class="sectionlabel">Recent</div>';
  if(!recent.length) h += '<div class="empty">No workouts logged yet. Pick a template above to start.</div>';
  for(const w of recent){
    h += `<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;margin-bottom:8px">
      <div><div style="font-weight:600;font-size:14px">${esc(w.templateName)}</div>
      <div class="dimtext">${fmtDT(w.date)} · ${w.entries.length} exercises</div></div>
      <button class="iconbtn" onclick="delWorkout('${w.id}')">✕</button></div>`;
  }
  return h;
}
function startSession(tid){
  const t = data.templates.find(x=>x.id===tid); if(!t) return;
  session = { templateId:t.id, templateName:t.name,
    entries: t.exercises.map(ex=>{
      const last = lastSets(ex.name, t.id);
      const target = Math.max(1, parseInt(ex.sets)||1);
      const sets = last.length ? last
        : Array.from({length:target},()=>({weight:"",reps:""}));
      return { exerciseName: ex.name, target: ex.sets && ex.reps ? `${ex.sets}×${ex.reps}` : "", repHint: ex.reps||"", sets };
    })};
  tab = "session"; render();
}
function delWorkout(id){
  if(!confirm("Delete this workout permanently?")) return;
  data.workouts = data.workouts.filter(w=>w.id!==id); save(); render();
}

//////////////////// SESSION ////////////////////
function viewSession(){
  let h = "";
  session.entries.forEach((e,ei)=>{
    const done = e.sets.filter(s=>String(s.weight).trim()!==""&&String(s.reps).trim()!=="").length;
    let plates = e.sets.map((_,i)=>`<div class="plate ${i<done?'done':''}"></div>`).join("");
    h += `<div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-weight:600;font-size:15.5px">${esc(e.exerciseName)}
          ${e.target?`<span class="mono dimtext" style="font-weight:400;margin-left:6px">${esc(e.target)}</span>`:""}</span>
        <div class="plates">${plates}</div></div>
      <div class="setrow sethead"><span>#</span><span>Weight (kg)</span><span>Reps</span><span></span></div>`;
    e.sets.forEach((s,si)=>{
      h += `<div class="setrow">
        <span class="mono dimtext">${si+1}</span>
        <input class="mono" type="number" inputmode="decimal" placeholder="0" value="${esc(s.weight)}"
          oninput="setVal(${ei},${si},'weight',this.value)">
        <input class="mono" type="number" inputmode="numeric" placeholder="${esc(e.repHint||"0")}" value="${esc(s.reps)}"
          oninput="setVal(${ei},${si},'reps',this.value)">
        <button class="iconbtn" onclick="rmSet(${ei},${si})">✕</button></div>`;
    });
    h += `<button class="btn btn-small" style="margin-top:6px" onclick="addSet(${ei})">+ Add set</button></div>`;
  });
  h += `<button class="btn btn-ghost" style="border-style:dashed;margin-bottom:16px" onclick="addSessionExercise()">+ Add exercise for this session</button>
    <div class="flexrow">
      <button class="btn btn-ghost" style="flex:1" onclick="discardSession()">‹ Discard</button>
      <button class="btn btn-primary" style="flex:2" onclick="finishSession()">✓ Finish Workout</button>
    </div>`;
  return h;
}
function setVal(ei,si,f,v){ session.entries[ei].sets[si][f]=v;
  // update plate stack without full re-render (keeps keyboard open)
  const cards=document.querySelectorAll("#content>.card");
  const e=session.entries[ei];
  const done=e.sets.filter(s=>String(s.weight).trim()!==""&&String(s.reps).trim()!=="").length;
  const plates=cards[ei]?.querySelectorAll(".plate");
  if(plates) plates.forEach((p,i)=>p.classList.toggle("done",i<done));
}
function addSet(ei){
  const sets=session.entries[ei].sets; const last=sets[sets.length-1]||{weight:"",reps:""};
  sets.push({weight:last.weight,reps:last.reps}); render();
}
function rmSet(ei,si){
  const sets=session.entries[ei].sets; sets.splice(si,1);
  if(!sets.length) sets.push({weight:"",reps:""}); render();
}
function addSessionExercise(){
  const name=prompt("Exercise name"); if(!name||!name.trim())return;
  session.entries.push({exerciseName:name.trim(),sets:[{weight:"",reps:""}]}); render();
}
function discardSession(){ if(confirm("Discard this workout?")){ session=null; tab="home"; render(); } }
function finishSession(){
  const entries = session.entries.map(e=>({exerciseName:e.exerciseName,
    sets:e.sets.filter(s=>String(s.weight).trim()!==""||String(s.reps).trim()!=="")}))
    .filter(e=>e.sets.length);
  if(!entries.length){ toast("Add at least one set before finishing"); return; }
  data.workouts.push({id:uid(),templateId:session.templateId,templateName:session.templateName,
    date:new Date().toISOString(),entries});
  save();
  const nm=session.templateName; session=null; tab="home"; render();
  toast(nm+" workout saved");
}

//////////////////// SHEET ////////////////////
function viewSheet(){
  const sorted=[...data.workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length) return '<div class="empty">Your logged workouts appear here as rows, ready to copy into a chat.</div>';
  let h="";
  for(const w of sorted){
    h+=`<div class="wblock"><div class="whead">
      <div><b style="font-size:13.5px">${esc(w.templateName)}</b>
      <span class="dimtext" style="margin-left:8px">${fmtDT(w.date)}</span></div>
      <button class="iconbtn" onclick="delWorkout('${w.id}')">✕</button></div><table><tbody>`;
    for(const e of w.entries){
      e.sets.forEach((s,si)=>{
        h+="<tr>";
        if(si===0) h+=`<td rowspan="${e.sets.length}" style="width:40%;vertical-align:top">${esc(e.exerciseName)}</td>`;
        h+=`<td class="mono dimtext" style="width:20%">set ${si+1}</td>
            <td class="mono" style="width:20%">${esc(s.weight)}kg</td>
            <td class="mono" style="width:20%">${esc(s.reps)} reps</td></tr>`;
      });
    }
    h+="</tbody></table></div>";
  }
  return h;
}

//////////////////// CHARTS ////////////////////
function exerciseNames(){
  const s=new Set(); data.workouts.forEach(w=>w.entries.forEach(e=>s.add(e.exerciseName)));
  return [...s].sort();
}
function viewCharts(){
  const names=exerciseNames();
  if(!names.length) return '<div class="empty">Log a couple of workouts and your progression charts show up here.</div>';
  if(!chartExercise||!names.includes(chartExercise)) chartExercise=names[0];
  let h=`<select onchange="chartExercise=this.value;render()" style="margin-bottom:18px">`;
  for(const n of names) h+=`<option ${n===chartExercise?"selected":""}>${esc(n)}</option>`;
  h+=`</select>
    <div class="sectionlabel" style="margin-top:0">Top set weight (kg)</div>
    <div class="card" style="padding:10px 6px 6px;margin-bottom:20px"><canvas class="chart" id="chartW"></canvas></div>
    <div class="sectionlabel">Session volume (kg × reps)</div>
    <div class="card" style="padding:10px 6px 6px"><canvas class="chart" id="chartV"></canvas></div>`;
  return h;
}
function chartData(){
  const rows=[];
  [...data.workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>{
    const e=w.entries.find(x=>x.exerciseName===chartExercise); if(!e)return;
    const nums=e.sets.map(s=>({w:parseFloat(s.weight)||0,r:parseFloat(s.reps)||0}));
    rows.push({date:new Date(w.date).toLocaleDateString(undefined,{month:"short",day:"numeric"}),
      top:Math.max(0,...nums.map(n=>n.w)),
      vol:nums.reduce((a,n)=>a+n.w*n.r,0)});
  });
  return rows;
}
function drawCharts(){
  const rows=chartData();
  drawLine("chartW",rows.map(r=>r.date),rows.map(r=>r.top),"#C08552");
  drawLine("chartV",rows.map(r=>r.date),rows.map(r=>r.vol),"#7FA66D");
}
function drawLine(id,labels,vals,color){
  const cv=document.getElementById(id); if(!cv)return;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth,H=cv.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  if(!vals.length){ ctx.fillStyle="#9AA0AE"; ctx.font="12px sans-serif"; ctx.fillText("No data yet",W/2-30,H/2); return; }
  const padL=38,padR=12,padT=10,padB=24;
  const minV=0, maxV=Math.max(...vals)*1.15||10;
  const x=i=>vals.length===1?(padL+(W-padL-padR)/2):padL+(W-padL-padR)*i/(vals.length-1);
  const y=v=>H-padB-(H-padB-padT)*(v-minV)/(maxV-minV);
  // gridlines + y labels
  ctx.strokeStyle="#333846"; ctx.fillStyle="#9AA0AE"; ctx.font="10px sans-serif"; ctx.lineWidth=1;
  for(let g=0;g<=4;g++){
    const v=minV+(maxV-minV)*g/4, yy=y(v);
    ctx.beginPath(); ctx.moveTo(padL,yy); ctx.lineTo(W-padR,yy); ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillText(Math.round(v),4,yy+3);
  }
  // x labels (thin out if many)
  const step=Math.ceil(labels.length/6);
  labels.forEach((l,i)=>{ if(i%step===0||i===labels.length-1){ ctx.fillText(l,Math.min(x(i)-14,W-40),H-8); } });
  // line
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
  vals.forEach((v,i)=>{ i===0?ctx.moveTo(x(i),y(v)):ctx.lineTo(x(i),y(v)); }); ctx.stroke();
  // dots
  ctx.fillStyle=color;
  vals.forEach((v,i)=>{ ctx.beginPath(); ctx.arc(x(i),y(v),3,0,7); ctx.fill(); });
}

//////////////////// EXPORT / IMPORT ////////////////////
function buildText(){
  const sorted=[...data.workouts].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let out=`Workout Log Export — ${sorted.length} sessions — generated ${new Date().toLocaleString()}\n`+"=".repeat(60)+"\n\n";
  for(const w of sorted){
    out+=`${fmtDT(w.date)} — ${w.templateName}\n`;
    for(const e of w.entries) out+=`  - ${e.exerciseName}: ${e.sets.map(s=>`${s.weight}kg x ${s.reps}`).join(", ")}\n`;
    out+="\n";
  }
  return out;
}
function buildTSV(){
  let out="Date\tTemplate\tExercise\tSet\tWeight(kg)\tReps\n";
  [...data.workouts].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>{
    w.entries.forEach(e=>e.sets.forEach((s,i)=>{
      out+=`${fmtDate(w.date)}\t${w.templateName}\t${e.exerciseName}\t${i+1}\t${s.weight}\t${s.reps}\n`;
    }));
  });
  return out;
}
function viewExport(){
  const has=data.workouts.length>0;
  const content=has?(exportFormat==="text"?buildText():buildTSV()):"";
  let h="";
  if(has){
    h+=`<div class="togglerow">
      <button class="toggle ${exportFormat==='text'?'active':''}" onclick="exportFormat='text';render()">Readable text</button>
      <button class="toggle ${exportFormat==='tsv'?'active':''}" onclick="exportFormat='tsv';render()">Spreadsheet (TSV)</button></div>
    <div class="flexrow" style="margin-bottom:12px">
      <button class="btn" onclick="copyExport()">⧉ Copy</button>
      <button class="btn" onclick="downloadExport()">⬇ Download</button></div>
    <textarea id="exportBox" readonly class="mono" style="height:280px;font-size:11.5px;resize:vertical">${esc(content)}</textarea>`;
  } else {
    h+='<div class="empty">Once you\'ve logged workouts, export them here as text to paste into a Claude chat.</div>';
  }
  h+=`<div class="sectionlabel">Backup & Restore</div>
    <div class="card" style="display:flex;flex-direction:column;gap:10px">
      <div class="dimtext">Full backup includes templates + every workout. Restore replaces everything on this device.</div>
      <button class="btn" onclick="downloadBackup()">⬇ Download full backup (.json)</button>
      <label class="btn" style="text-align:center;display:block;cursor:pointer">⬆ Restore from backup
        <input type="file" accept=".json,application/json" style="display:none" onchange="restoreBackup(this)"></label>
    </div>`;
  return h;
}
function copyExport(){
  const box=document.getElementById("exportBox");
  const txt=box.value;
  let ok=false;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast("Copied!"),()=>fallbackCopy(box));
    return;
  }
  fallbackCopy(box);
}
function fallbackCopy(box){
  try{ box.focus(); box.select(); box.setSelectionRange(0,999999);
    document.execCommand("copy")?toast("Copied!"):toast("Select the text and copy manually");
  }catch(e){ toast("Select the text and copy manually"); }
}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function downloadExport(){
  downloadFile(exportFormat==="text"?"workout-log.txt":"workout-log.tsv",
    exportFormat==="text"?buildText():buildTSV(),"text/plain");
}
function downloadBackup(){
  downloadFile("ironlog-backup-"+new Date().toISOString().slice(0,10)+".json",
    JSON.stringify(data,null,2),"application/json");
}
function restoreBackup(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||!Array.isArray(d.templates)||!Array.isArray(d.workouts)) throw new Error("bad shape");
      if(!confirm(`Restore ${d.workouts.length} workouts and ${d.templates.length} templates? This replaces current data.`))return;
      data=d; save(); render(); toast("Backup restored");
    }catch(e){ toast("That file isn't a valid Iron Log backup"); }
  };
  r.readAsText(f);
  input.value="";
}

//////////////////// EDIT TEMPLATES ////////////////////
let openTpl=null;
function viewEdit(){
  let h="";
  for(const t of data.templates){
    const open=openTpl===t.id;
    h+=`<div class="card" style="padding:0;margin-bottom:10px;overflow:hidden">
      <button style="width:100%;background:none;border:none;color:var(--text);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:14.5px;font-weight:600"
        onclick="openTpl=openTpl==='${t.id}'?null:'${t.id}';render()">
        <span>${esc(t.name)}</span><span>${open?"▾":"›"}</span></button>`;
    if(open){
      h+=`<div style="padding:0 14px 14px">
        <input value="${esc(t.name)}" oninput="tplName('${t.id}',this.value)" style="margin-bottom:10px" placeholder="Template name">
        <div style="display:grid;grid-template-columns:1fr 52px 72px 30px;gap:6px;margin-bottom:4px" class="sethead"><span>Exercise</span><span>Sets</span><span>Reps</span><span></span></div>`;
      t.exercises.forEach(e=>{
        h+=`<div style="display:grid;grid-template-columns:1fr 52px 72px 30px;gap:6px;margin-bottom:6px;align-items:center">
          <input value="${esc(e.name)}" oninput="exField('${t.id}','${e.id}','name',this.value)">
          <input class="mono" type="number" inputmode="numeric" value="${esc(e.sets||"")}" oninput="exField('${t.id}','${e.id}','sets',this.value)">
          <input class="mono" value="${esc(e.reps||"")}" placeholder="8–12" oninput="exField('${t.id}','${e.id}','reps',this.value)">
          <button class="iconbtn" onclick="rmEx('${t.id}','${e.id}')">✕</button></div>`;
      });
      h+=`<button class="btn btn-small" style="margin-top:4px" onclick="addEx('${t.id}')">+ Add exercise</button></div>`;
    }
    h+="</div>";
  }
  h+=`<button class="btn btn-ghost" style="margin-top:12px" onclick="resetTemplates()">Reset templates to my programme defaults</button>
    <div class="dimtext" style="margin-top:12px;text-align:center">Changes save automatically. Reset only replaces templates — workout history is untouched.</div>`;
  return h;
}
function resetTemplates(){
  if(!confirm("Replace all templates with the built-in programme? Your workout history is NOT affected."))return;
  data.templates = JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
  save(); render(); toast("Templates reset");
}
function exField(tid,eid,f,v){
  const t=data.templates.find(x=>x.id===tid); const e=t&&t.exercises.find(x=>x.id===eid);
  if(e){ e[f] = f==="sets" ? (parseInt(v)||"") : v; save(); }
}
function tplName(tid,v){ const t=data.templates.find(x=>x.id===tid); if(t){t.name=v; save();} }
function rmEx(tid,eid){ const t=data.templates.find(x=>x.id===tid); if(t){t.exercises=t.exercises.filter(x=>x.id!==eid); save(); render();} }
function addEx(tid){ const t=data.templates.find(x=>x.id===tid); if(t){t.exercises.push({id:uid(),name:"New Exercise",sets:3,reps:""}); save(); render();} }

window.addEventListener("resize",()=>{ if(tab==="charts") drawCharts(); });
render();
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
